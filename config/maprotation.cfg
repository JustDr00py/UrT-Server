// ─────────────────────────────────────────────────────────────────────────────
// Urban Terror 4.3 – Map Rotation (Team Survivor optimized)
// Maps are curated for good TS gameplay with 8v8 (16 players).
// ─────────────────────────────────────────────────────────────────────────────

// Rotation uses chained nextmap cvars so each map triggers the next.
// Format: set dN "map <mapname>; set nextmap vstr dN+1"
// The last entry wraps back to d1 to loop the rotation.

set d1  "map ut4_algiers;      set nextmap vstr d2"
set d2  "map ut4_austria;      set nextmap vstr d3"
set d3  "map ut4_casa;         set nextmap vstr d4"
set d4  "map ut4_commune;      set nextmap vstr d5"
set d5  "map ut4_crossing;     set nextmap vstr d6"
set d6  "map ut4_deception;    set nextmap vstr d7"
set d7  "map ut4_docks;        set nextmap vstr d8"
set d8  "map ut4_eagle;        set nextmap vstr d9"
set d9  "map ut4_harbortown;   set nextmap vstr d10"
set d10 "map ut4_kingdom;      set nextmap vstr d11"
set d11 "map ut4_mandolin;     set nextmap vstr d12"
set d12 "map ut4_maya;         set nextmap vstr d13"
set d13 "map ut4_oildepot;     set nextmap vstr d14"
set d14 "map ut4_prague;       set nextmap vstr d15"
set d15 "map ut4_shelter;      set nextmap vstr d16"
set d16 "map ut4_tombs;        set nextmap vstr d17"
set d17 "map ut4_toxic;        set nextmap vstr d18"
set d18 "map ut4_tunis;        set nextmap vstr d19"
set d19 "map ut4_uptown;       set nextmap vstr d20"
set d20 "map ut4_sanc;         set nextmap vstr d1"

// Start the rotation from map 1
vstr d1
