services:
  urt-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urt-server
    restart: unless-stopped

    # Load all settings from .env
    env_file: .env

    # host network: container shares the host's network stack directly.
    # Eliminates Docker NAT/iptables overhead on every UDP packet — critical
    # for a game server where jitter shows up as ping spikes.
    # The ports: mapping is not used in host mode (server binds directly to host port).
    network_mode: host

    volumes:
      # Game files (read-only) – place your UrT 4.3 server files here
      - ./urt-game:/opt/urtserver/game:ro

      # Writable data: generated configs, logs, downloaded content
      - urt-data:/opt/urtserver/data

      # Hot-reload map rotation without rebuilding the image
      - ./config/maprotation.cfg:/opt/urtserver/data/q3ut4/maprotation.cfg:ro

    # UrT server is not memory-heavy; cap keeps the host healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

    # Capture logs with timestamps
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      # UDP-based health: server echoes to a status query on its port
      test: ["CMD-SHELL", "echo -n '\\xff\\xff\\xff\\xffgetstatus' | nc -u -w2 127.0.0.1 ${URT_PORT:-27960} | grep -q 'sv_maxclients' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  urt-data:
    driver: local
